  <rect x="720" y="55" width="130" height="90" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text x="785" y="94" text-anchor="middle" font-size="11" font-weight="600" fill="#6c757d">05</text>
  <text x="785" y="112" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1a2e">Report</text>
