<svg viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">

  <!-- Background -->
  <rect width="900" height="200" fill="#ffffff"/>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a2e">Client Onboarding Process</text>

  <!-- Step 1: Discover -->
  <rect x="40" y="55" width="130" height="90" rx="8" fill="#1a1a2e" stroke="none"/>
