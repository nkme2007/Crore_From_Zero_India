  <text x="105" y="112" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Discover</text>
  <text x="105" y="128" text-anchor="middle" font-size="9" fill="#adb5bd">Needs &amp; goals</text>

  <!-- Arrow 1 -->
  <line x1="170" y1="100" x2="200" y2="100" stroke="#dee2e6" stroke-width="1.5"/>
  <polygon points="200,95 210,100 200,105" fill="#dee2e6"/>

  <!-- Step 2: Profile -->
  <rect x="210" y="55" width="130" height="90" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text x="275" y="94" text-anchor="middle" font-size="11" font-weight="600" fill="#6c757d">02</text>
  <text x="275" y="112" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1a2e">Profile</text>
  <text x="275" y="128" text-anchor="middle" font-size="9" fill="#6c757d">Data collection</text>

  <!-- Arrow 2 -->
  <line x1="340" y1="100" x2="370" y2="100" stroke="#dee2e6" stroke-width="1.5"/>
  <polygon points="370,95 380,100 370,105" fill="#dee2e6"/>

  <!-- Step 3: Validate -->
  <rect x="380" y="55" width="130" height="90" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text x="445" y="94" text-anchor="middle" font-size="11" font-weight="600" fill="#6c757d">03</text>
  <text x="445" y="112" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1a2e">Validate</text>
  <text x="445" y="128" text-anchor="middle" font-size="9" fill="#6c757d">Risk &amp; compliance</text>

  <!-- Arrow 3 -->
  <line x1="510" y1="100" x2="540" y2="100" stroke="#dee2e6" stroke-width="1.5"/>
  <polygon points="540,95 550,100 540,105" fill="#dee2e6"/>

  <!-- Step 4: Improve -->
  <rect x="550" y="55" width="130" height="90" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text x="615" y="94" text-anchor="middle" font-size="11" font-weight="600" fill="#6c757d">04</text>
  <text x="615" y="112" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1a2e">Improve</text>
  <text x="615" y="128" text-anchor="middle" font-size="9" fill="#6c757d">Optimise setup</text>

  <!-- Arrow 4 -->
  <line x1="680" y1="100" x2="710" y2="100" stroke="#dee2e6" stroke-width="1.5"/>
